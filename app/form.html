<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/form.css">
    <title>Crie seu blog - Viajei</title>
</head>

<body>
    <div id="container">
        <header>
            <a href="./index.html">Viajei</a>
            <a href="./sobre.html">Sobre</a>
            <a href="./form.html">Crie seu blog</a>
        </header>

        <section>
            <h1>Crie seu blog</h1>

            <div class="form-box">
                <div class="form-group">
                    <label for="usuario">Nome</label>
                    <input type="text" id="usuario" name="nome" placeholder="Seu nome completo">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="historia">História</label>
                    <textarea id="historia" name="historia" rows="8" placeholder="Conta sua aventura..."></textarea>
                </div>

                <button type="button">Publicar</button>
            </div>
        </section>
    </div>
</body>

</html>
